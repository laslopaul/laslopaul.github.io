baseURL = "https://laslopaul.dev/"
locale = "en-us"
title = "laslopaul"
theme = [ "re-terminal" ]
enableRobotsTXT = true


[params]
description = "devops & homelab enthusiast"
author = "laslopaul"
keywords = [
"devops",
"homelab",
"kubernetes",
"linux",
"ansible",
"terraform"
]
defaultTheme = "dark"
themeColor = "orange"

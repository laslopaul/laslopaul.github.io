fullWidthTheme = false
centerTheme = true
readingTime = true


[params.logo]
logoText = "laslopaul.dev"
logoHomeLink = "/"


[permalinks]
posts = "/:slug/"


[[menu.main]]
identifier = "posts"
name = "Posts"
url = "/posts/"
weight = 1


[[menu.main]]
identifier = "about"
name = "About"
url = "/about/"
weight = 2


[markup.highlight]
noClasses = false


[caches.images]
dir = ":cacheDir/images"

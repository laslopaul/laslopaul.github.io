baseURL = "https://laslopaul.dev/"
locale = "en-us"
title = "laslopaul"
theme = [ "PaperMod" ]
enableRobotsTXT = true


[params]
description = "devops & homelab enthusiast"
author = "laslopaul"
keywords = [
"devops",
"homelab",
"kubernetes",
"linux",
"ansible",
"terraform"
]
env = "production"
defaultTheme = "dark"
disableThemeToggle = true
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowCodeCopyButtons = true
ShowBreadCrumbs = false
ShowToc = false
TocOpen = false
ShowWordCount = false
ShowRssButtonInSectionTermList = true
ShowPoweredBy = false


[permalinks]
posts = "/:slug/"


[[menu.main]]
identifier = "posts"
name = "Posts"
url = "/posts/"
weight = 1


[[menu.main]]
identifier = "about"
name = "About"
url = "/"
weight = 2


[markup.highlight]
noClasses = false


[caches.images]
dir = ":cacheDir/images"
